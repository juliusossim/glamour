name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Enable Corepack and pnpm
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: |
            ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Cache Nx repository cache
        uses: actions/cache@v4
        with:
          path: .nx/cache
          key: ${{ runner.os }}-nx-${{ hashFiles('**/pnpm-lock.yaml', '**/nx.json') }}
          restore-keys: |
            ${{ runner.os }}-nx-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate project tags
        run: pnpm run check:tags

      - name: Run affected lint
        run: pnpm nx affected --target=lint --base=origin/main --head=HEAD

      - name: Run affected tests
        run: pnpm nx affected --target=test --base=origin/main --head=HEAD

      - name: Run affected build
        run: pnpm nx affected --target=build --base=origin/main --head=HEAD
      - name: Run affected typecheck
        run: pnpm nx affected --target=typecheck --base=origin/main --head=HEAD
      - name: Run affected e2e
        run: pnpm nx affected --target=e2e --base=origin/main --head=HEAD

      #- run: npx playwright install --only-shell

      # Prepend any command with "nx-cloud record --" to record its logs to Nx Cloud
      # - run: npx nx-cloud record -- echo Hello World
      #- run: npx nx run-many -t lint test build typecheck e2e
      # Nx Cloud recommends fixes for failures to help you get CI green faster. Learn more: https://nx.dev/ci/features/self-healing-ci
      - name: Run affected ci fixes
        run: pnpm nx affected --target=fix-ci --base=origin/main --head=HEAD
        if: always()
